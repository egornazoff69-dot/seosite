<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Назаров · Хаб</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:      #F8F7F0;
  --bg2:     #FFFFFF;
  --bg3:     #F0EEE7;
  --bg4:     #E8E6DD;
  --border:  #DDD9CE;
  --shadow:  0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.04);
  --shadow-md: 0 4px 20px rgba(0,0,0,.10);
  --text:    #1A1A24;
  --muted:   #8A8A9A;
  --accent:  #00A8B8;
  --accent-bg: rgba(0,168,184,.09);
  --accent2: #D94F4F;
  --accent2-bg: rgba(217,79,79,.09);
  --accent3: #2D9B47;
  --accent3-bg: rgba(45,155,71,.09);
  --gold:    #C07C00;
  --gold-bg: rgba(192,124,0,.09);
  --font:    'Montserrat', sans-serif;
  --mono:    'JetBrains Mono', monospace;
  --radius:  12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }

/* ═══════════════ TOPBAR ═══════════════ */
.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 1px 0 var(--border);
}

.logo { font-size: 15px; font-weight: 800; letter-spacing: -.5px; color: var(--text); }
.logo span { color: var(--accent); }

.topbar-right { display: flex; align-items: center; gap: 10px; }

.last-upd { font-size: 11px; color: var(--muted); font-family: var(--mono); }

.btn-sm {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--muted);
  font-size: 12px;
  padding: 5px 11px;
  cursor: pointer;
  font-family: var(--font);
  font-weight: 600;
  transition: all .15s;
  white-space: nowrap;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }

/* ═══════════════ TABS ═══════════════ */
.tabs-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs-bar::-webkit-scrollbar { display: none; }

.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 12px 16px 11px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
  margin-bottom: -1px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ═══════════════ CONTENT ═══════════════ */
.tab-pane { display: none; padding: 20px; max-width: 1280px; margin: 0 auto; padding-bottom: 48px; }
.tab-pane.active { display: block; }

/* ═══════════════ SECTION LABELS ═══════════════ */
.sec { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; margin-top: 24px; }
.sec:first-child { margin-top: 0; }

/* ═══════════════ KPI CARDS ═══════════════ */
.kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
@media(min-width:520px) { .kpi-grid { grid-template-columns: repeat(3,1fr); } }
@media(min-width:900px) { .kpi-grid { grid-template-columns: repeat(6,1fr); } }

.kpi {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 14px 12px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
  animation: fadeUp .35s ease both;
}
.kpi::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: var(--accent);
  border-radius: 3px 3px 0 0;
}
.kpi.red::after { background: var(--accent2); }
.kpi.green::after { background: var(--accent3); }
.kpi.gold::after { background: var(--gold); }
.kpi.gray::after { background: var(--border); }

.kpi-lbl { font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
.kpi-val { font-size: 22px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
.kpi-val.c-accent { color: var(--accent); }
.kpi-val.c-red   { color: var(--accent2); }
.kpi-val.c-green { color: var(--accent3); }
.kpi-val.c-gold  { color: var(--gold); }
.kpi-sub { font-size: 10px; color: var(--muted); margin-top: 5px; font-family: var(--mono); }

/* ═══════════════ TODAY LIST ═══════════════ */
.today-list { display: flex; flex-direction: column; gap: 7px; }

.today-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent2);
  border-radius: var(--radius);
  padding: 11px 14px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  box-shadow: var(--shadow);
  animation: fadeUp .35s ease both;
  cursor: pointer;
  transition: box-shadow .15s;
}
.today-item:hover { box-shadow: var(--shadow-md); }
.today-item.ok { border-left-color: var(--accent3); }
.today-item.warn { border-left-color: var(--gold); }

.badge-time {
  font-size: 9px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
  padding: 3px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-top: 1px;
}
.badge-time.overdue { background: var(--accent2-bg); color: var(--accent2); }
.badge-time.today   { background: var(--accent-bg);  color: var(--accent); }
.badge-time.soon    { background: var(--accent3-bg); color: var(--accent3); }

.today-name { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
.today-action { color: var(--text); font-size: 12px; }
.today-meta { color: var(--muted); font-size: 11px; margin-top: 3px; font-family: var(--mono); }

/* ═══════════════ FUNNEL ═══════════════ */
.funnel-scroll { overflow-x: auto; scrollbar-width: thin; padding-bottom: 4px; }
.funnel { display: flex; gap: 6px; min-width: max-content; }

.funnel-stage {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  min-width: 120px;
  max-width: 140px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all .15s;
  position: relative;
}
.funnel-stage:hover { border-color: var(--accent); box-shadow: var(--shadow-md); }
.funnel-stage.active-filter { border-color: var(--accent); background: var(--accent-bg); }

.funnel-stage::after {
  content: '›';
  position: absolute;
  right: -10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: var(--border);
  font-weight: 700;
  z-index: 1;
}
.funnel-stage:last-child::after { display: none; }

.f-num { font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 4px; font-family: var(--mono); }
.f-count { font-size: 24px; font-weight: 800; letter-spacing: -1px; color: var(--text); line-height: 1; }
.f-label { font-size: 10px; color: var(--muted); margin-top: 3px; line-height: 1.3; }
.f-sum { font-size: 10px; color: var(--gold); font-family: var(--mono); font-weight: 600; margin-top: 5px; }

/* ═══════════════ TABLES ═══════════════ */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }

.table-wrap { overflow-x: auto; }

table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th {
  background: var(--bg3);
  padding: 9px 14px;
  text-align: left;
  font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
}
tbody tr { border-bottom: 1px solid var(--bg3); transition: background .1s; cursor: pointer; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
tbody td { padding: 10px 14px; vertical-align: middle; }

.td-name { font-weight: 600; font-size: 13px; }
.td-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; }
.td-mono { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.td-sum  { font-family: var(--mono); font-weight: 700; color: var(--accent3); }
.td-focus { font-size: 11px; color: var(--muted); max-width: 160px; }

/* STATUS BADGES */
.s-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 5px;
  font-size: 10px; font-weight: 700; letter-spacing: .3px;
  white-space: nowrap;
}

/* ═══════════════ FUNNEL STATUS COLORS ═══════════════ */
.sf1  { background: #F0EEE7; color: #888; }
.sf2  { background: #EEF0FF; color: #6A7AE8; }
.sf3  { background: #EEF5FF; color: #4A90D9; }
.sf4  { background: #E8F5FF; color: #2A9FD6; }
.sf5  { background: #E4F8FF; color: #009CBF; }
.sf6  { background: #E0FBFF; color: #00A0BC; }
.sf7  { background: #E8FFF0; color: #1EA655; }
.sf8  { background: #DFFFF0; color: #0D9B4A; }
.sf9  { background: #D8FFE8; color: #0A8E42; }
.sf10 { background: #D0FFE4; color: #088038; }
.sf11 { background: #C8FFE0; color: #05762E; }
.sf12 { background: #BAFFD6; color: #036824; }
.sf-won  { background: #D0FFE4; color: #036824; }
.sf-lost { background: #FFE8E8; color: var(--accent2); }
.sf-work { background: var(--accent3-bg); color: var(--accent3); }
.sf-plan { background: var(--bg3); color: var(--muted); }
.sf-pause{ background: var(--accent2-bg); color: var(--accent2); }
.sf-done { background: var(--bg4); color: var(--muted); }

/* ═══════════════ CHART PANEL ═══════════════ */
.chart-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
.chart-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
.chart-title { font-size: 14px; font-weight: 700; }
.period-btns { display: flex; gap: 4px; }
.period-btn {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  padding: 4px 10px; font-family: var(--font); font-size: 11px; font-weight: 700;
  color: var(--muted); cursor: pointer; transition: all .15s;
}
.period-btn:hover { color: var(--accent); border-color: var(--accent); }
.period-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

.chart-legend { display: flex; gap: 14px; font-size: 11px; color: var(--muted); margin-top: 8px; }
.ldot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 4px; }

/* ═══════════════ MODAL ═══════════════ */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35);
  z-index: 1000; align-items: center; justify-content: center; padding: 20px;
  backdrop-filter: blur(2px);
}
.modal-overlay.open { display: flex; animation: fadeIn .2s ease; }

.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px; max-width: 480px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
  animation: slideUp .2s ease;
  max-height: 85vh; overflow-y: auto;
}
.modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-size: 18px; font-weight: 800; letter-spacing: -.3px; flex: 1; padding-right: 12px; }
.modal-close { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; width: 30px; height: 30px; cursor: pointer; font-size: 16px; flex-shrink: 0; line-height: 30px; text-align: center; color: var(--muted); transition: all .15s; }
.modal-close:hover { background: var(--accent2-bg); color: var(--accent2); }

.modal-field { margin-bottom: 14px; }
.modal-field-label { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.modal-field-value { font-size: 14px; font-weight: 500; }
.modal-field-value.mono { font-family: var(--mono); }
.modal-field-value.big { font-size: 22px; font-weight: 800; color: var(--accent3); letter-spacing: -1px; }

.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }

.modal-sep { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* ═══════════════ EMPTY STATE ═══════════════ */
.empty { text-align: center; padding: 32px 20px; color: var(--muted); }
.empty-icon { font-size: 28px; margin-bottom: 8px; }
.empty p { font-size: 13px; }

/* ═══════════════ LOADING ═══════════════ */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; gap: 14px; }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.err-box { background: var(--accent2-bg); border: 1px solid rgba(217,79,79,.25); border-radius: var(--radius); padding: 14px 18px; color: var(--accent2); font-size: 13px; line-height: 1.5; margin-bottom: 16px; }

/* ═══════════════ LAYOUT HELPERS ═══════════════ */
.two-col { display: grid; gap: 16px; }
@media(min-width:900px) { .two-col { grid-template-columns: 1fr 1fr; } }

.mt0 { margin-top: 0 !important; }
.mt8 { margin-top: 8px; }
.mt16 { margin-top: 16px; }

/* ═══════════════ ANIMATIONS ═══════════════ */
@keyframes fadeUp  { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
@keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

/* ═══════════════ SCROLLBAR ═══════════════ */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span>НАЗ</span>АРОВ · ХАБ</div>
  <div class="topbar-right">
    <span class="last-upd" id="last-upd">загрузка...</span>
    <button class="btn-sm" onclick="loadAll()">↻ Обновить</button>
  </div>
</div>

<div class="tabs-bar">
  <button class="tab-btn active" data-tab="home">🏠 Главная</button>
  <button class="tab-btn" data-tab="pipeline">📋 Лиды &amp; Проекты</button>
  <button class="tab-btn" data-tab="money">💰 Деньги</button>
</div>

<!-- ─────────────── TAB: ГЛАВНАЯ ─────────────── -->
<div class="tab-pane active" id="tab-home">
  <div id="home-content"><div class="loading"><div class="spinner"></div><p style="color:var(--muted);font-size:13px">Загрузка...</p></div></div>
</div>

<!-- ─────────────── TAB: ЛИДЫ & ПРОЕКТЫ ─────────────── -->
<div class="tab-pane" id="tab-pipeline">
  <div id="pipeline-content"><div class="loading"><div class="spinner"></div></div></div>
</div>

<!-- ─────────────── TAB: ДЕНЬГИ ─────────────── -->
<div class="tab-pane" id="tab-money">
  <div id="money-content"><div class="loading"><div class="spinner"></div></div></div>
</div>

<!-- ─────────────── MODAL ─────────────── -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-body"></div>
</div>

<script>
// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const URL_MONEY    = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRrcRXLhjNBIPfzR7wfyQc22CK0JQXH3YosKMyTMQyZKzVtwvP7GcmMu99OTc1moVTNNb4LLqW5z-qN/pub?gid=1821694777&single=true&output=csv';
const URL_ENTITIES = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRrcRXLhjNBIPfzR7wfyQc22CK0JQXH3YosKMyTMQyZKzVtwvP7GcmMu99OTc1moVTNNb4LLqW5z-qN/pub?gid=224591603&single=true&output=csv';

// ═══════════════════════════════════════════════
//  FUNNEL STAGES
// ═══════════════════════════════════════════════
const LEAD_STAGES = [
  { num:1,  key:'Первый контакт',       short:'1 контакт',   cls:'sf1' },
  { num:2,  key:'Вышел на ЛПР',         short:'2 ЛПР',       cls:'sf2' },
  { num:3,  key:'Согласен на созвон',   short:'3 созвон ✓',  cls:'sf3' },
  { num:4,  key:'Назначен бриф',        short:'4 бриф ↗',   cls:'sf4' },
  { num:5,  key:'Проведён бриф',        short:'5 бриф ✓',    cls:'sf5' },
  { num:6,  key:'КП презентация',       short:'6 КП презент',cls:'sf6' },
  { num:7,  key:'КП получен',           short:'7 КП получен',cls:'sf7' },
  { num:8,  key:'Согласен на работу',   short:'8 согласен',  cls:'sf8' },
  { num:9,  key:'Направлен договор',    short:'9 договор ↗', cls:'sf9' },
  { num:10, key:'Согласован договор',   short:'10 договор ✓',cls:'sf10' },
  { num:11, key:'Подписан договор',     short:'11 подписан', cls:'sf11' },
  { num:12, key:'Получены деньги',      short:'12 $$',       cls:'sf12' },
];
const LOST_KEY = 'Проигран';
const CLOSED_LEAD = ['Получены деньги', 'Проигран'];
const CLOSED_PROJ = ['Завершён'];
const ACTIVE_PROJ = ['В работе', 'План', 'Пауза'];

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let S = { money: [], entities: [], moneyPeriod: '30d', funnelFilter: null };
let moneyChart = null;
let renderPending = { pipeline: true, money: true };

// ═══════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const id = btn.dataset.tab;
    document.getElementById('tab-' + id).classList.add('active');
    if (id === 'pipeline' && renderPending.pipeline) { renderPipeline(); renderPending.pipeline = false; }
    if (id === 'money'    && renderPending.money)    { renderMoney();    renderPending.money = false; }
  });
});

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const hdrs = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur); cur = ''; }
      else cur += c;
    }
    vals.push(cur);
    const obj = {};
    hdrs.forEach((h, i) => obj[h] = (vals[i] || '').replace(/^"|"$/g,'').trim());
    return obj;
  });
}

function fmtRub(n) {
  n = parseFloat(n) || 0;
  if (n >= 1000000) return (n/1000000).toFixed(1).replace('.0','') + ' млн ₽';
  if (n >= 1000) return Math.round(n/1000) + ' т₽';
  return n + ' ₽';
}

function fmtRubFull(n) {
  return (parseFloat(n)||0).toLocaleString('ru') + ' ₽';
}

// YYYY-MM-DD → DD.MM.YYYY
function fmtDate(s) {
  if (!s) return '—';
  const m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${m[3]}.${m[2]}.${m[1]}`;
  return s;
}

function today0() { const d = new Date(); d.setHours(0,0,0,0); return d; }

function daysDiff(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.ceil((d - today0()) / 86400000);
}

function stageClass(status) {
  if (!status) return 'sf1';
  const found = LEAD_STAGES.find(s => s.key === status);
  if (found) return found.cls;
  if (status === LOST_KEY) return 'sf-lost';
  if (status === 'Получены деньги') return 'sf-won';
  if (status === 'В работе') return 'sf-work';
  if (status === 'План')     return 'sf-plan';
  if (status === 'Пауза')    return 'sf-pause';
  if (status === 'Завершён') return 'sf-done';
  return 'sf1';
}

// ═══════════════════════════════════════════════
//  LOAD
// ═══════════════════════════════════════════════
async function loadAll() {
  document.getElementById('home-content').innerHTML = `<div class="loading"><div class="spinner"></div><p style="color:var(--muted);font-size:13px">Загрузка данных...</p></div>`;
  renderPending.pipeline = true;
  renderPending.money    = true;

  try {
    const t = Date.now();
    const [r1, r2] = await Promise.all([
      fetch(URL_MONEY    + '&t=' + t),
      fetch(URL_ENTITIES + '&t=' + t)
    ]);
    const [c1, c2] = await Promise.all([r1.text(), r2.text()]);
    S.money    = parseCSV(c1);
    S.entities = parseCSV(c2);
    renderHome();
    if (!document.getElementById('tab-pipeline').classList.contains('active') &&
        !document.getElementById('tab-money').classList.contains('active')) {
      renderPending.pipeline = true;
      renderPending.money    = true;
    } else {
      if (document.getElementById('tab-pipeline').classList.contains('active')) renderPipeline();
      if (document.getElementById('tab-money').classList.contains('active'))    renderMoney();
    }
    document.getElementById('last-upd').textContent = new Date().toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    document.getElementById('home-content').innerHTML = `<div class="err-box">⚠️ Не удалось загрузить данные из Google Sheets.<br><small>${e.message}</small><br><br>Проверь что оба листа опубликованы: Файл → Поделиться → Опубликовать в интернете → CSV.</div>`;
  }
}

// ═══════════════════════════════════════════════
//  HOME
// ═══════════════════════════════════════════════
function renderHome() {
  const tod = today0();
  const todStr = tod.toISOString().slice(0,10);
  const thisMon = todStr.slice(0,7);
  const lastMon = (() => { const d = new Date(tod); d.setMonth(d.getMonth()-1); return d.toISOString().slice(0,7); })();

  let incThis=0, incLast=0, expThis=0;
  S.money.forEach(r => {
    const m = (r['Дата']||'').slice(0,7);
    const a = parseFloat(r['Сумма'])||0;
    if (m===thisMon && r['Тип']==='Доход')  incThis += a;
    if (m===lastMon && r['Тип']==='Доход')  incLast += a;
    if (m===thisMon && r['Тип']==='Расход') expThis += a;
  });
  const delta = incThis - incLast;

  const activeLeads = S.entities.filter(r => r['Тип']==='Лид' && !CLOSED_LEAD.includes(r['Статус']));
  const activeProj  = S.entities.filter(r => r['Тип']==='Проект' && ACTIVE_PROJ.includes(r['Статус']));
  const potential   = activeLeads.reduce((s,r) => s+(parseFloat(r['Сумма'])||0), 0);

  const urgent = S.entities.filter(r => {
    const d = r['Дата следующего шага'];
    if (!d || CLOSED_LEAD.includes(r['Статус']) || CLOSED_PROJ.includes(r['Статус'])) return false;
    const diff = daysDiff(d);
    return diff !== null && diff <= 0;
  }).sort((a,b)=>(a['Дата следующего шага']||'').localeCompare(b['Дата следующего шага']||''));

  const soon = S.entities.filter(r => {
    const d = r['Дата следующего шага'];
    if (!d || CLOSED_LEAD.includes(r['Статус']) || CLOSED_PROJ.includes(r['Статус'])) return false;
    const diff = daysDiff(d);
    return diff !== null && diff > 0 && diff <= 3;
  });

  const todayItems = [...urgent, ...soon];

  const dSign = delta >= 0 ? '+' : '';
  const dColor = delta >= 0 ? 'c-green' : 'c-red';

  document.getElementById('home-content').innerHTML = `
    <p class="sec mt0">Метрики</p>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-lbl">Доход этот месяц</div><div class="kpi-val c-accent">${fmtRub(incThis)}</div><div class="kpi-sub">расходы ${fmtRub(expThis)}</div></div>
      <div class="kpi ${delta>=0?'green':'red'}"><div class="kpi-lbl">Прошлый месяц</div><div class="kpi-val">${fmtRub(incLast)}</div><div class="kpi-sub" style="color:${delta>=0?'var(--accent3)':'var(--accent2)'}">${dSign}${fmtRub(Math.abs(delta))}</div></div>
      <div class="kpi gold"><div class="kpi-lbl">Потенциал лидов</div><div class="kpi-val c-gold">${fmtRub(potential)}</div><div class="kpi-sub">${activeLeads.length} активных</div></div>
      <div class="kpi"><div class="kpi-lbl">Активные лиды</div><div class="kpi-val">${activeLeads.length}</div><div class="kpi-sub">в воронке</div></div>
      <div class="kpi green"><div class="kpi-lbl">Проекты</div><div class="kpi-val c-green">${activeProj.length}</div><div class="kpi-sub">в работе / план</div></div>
      <div class="kpi ${urgent.length>0?'red':'gray'}"><div class="kpi-lbl">Просрочено</div><div class="kpi-val ${urgent.length>0?'c-red':''}">${urgent.length}</div><div class="kpi-sub">${soon.length} — ближайшие 3д</div></div>
    </div>

    <p class="sec">⚡ Сделать сейчас</p>
    <div class="today-list">
      ${todayItems.length===0
        ? `<div class="empty"><div class="empty-icon">🎉</div><p>Всё чисто — задач нет</p></div>`
        : todayItems.slice(0,10).map(r => {
            const diff = daysDiff(r['Дата следующего шага']);
            let cls='', lbl='';
            if (diff < 0)      { cls='overdue'; lbl=`просрочено ${Math.abs(diff)}д`; }
            else if (diff===0) { cls='today';   lbl='сегодня'; }
            else               { cls='soon';    lbl=`через ${diff}д`; }
            return `<div class="today-item ${diff<=0?'':'ok'}" onclick='openEntityModal(${JSON.stringify(r)})'>
              <span class="badge-time ${cls}">${lbl}</span>
              <div>
                <div class="today-name">${r['Название']||'—'}</div>
                <div class="today-action">→ ${r['Следующий шаг']||'нет действия'}</div>
                <div class="today-meta">${r['Клиент']||''} · ${fmtDate(r['Дата следующего шага'])}</div>
              </div>
            </div>`;
          }).join('')}
    </div>

    <p class="sec">Воронка (лиды)</p>
    <div class="funnel-scroll">
      <div class="funnel" id="home-funnel">${buildMiniHomeFunnel(activeLeads)}</div>
    </div>
  `;
}

function buildMiniHomeFunnel(leads) {
  return LEAD_STAGES.map(st => {
    const items = leads.filter(r => r['Статус'] === st.key);
    const sum   = items.reduce((s,r) => s+(parseFloat(r['Сумма'])||0), 0);
    return `<div class="funnel-stage" onclick="switchToPipeline('${st.key}')">
      <div class="f-num">${st.num}</div>
      <div class="f-count">${items.length}</div>
      <div class="f-label">${st.short.replace(/^\d+ /,'')}</div>
      ${sum ? `<div class="f-sum">${fmtRub(sum)}</div>` : ''}
    </div>`;
  }).join('');
}

function switchToPipeline(filterKey) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-tab="pipeline"]').classList.add('active');
  document.getElementById('tab-pipeline').classList.add('active');
  S.funnelFilter = filterKey;
  renderPipeline();
  renderPending.pipeline = false;
}

// ═══════════════════════════════════════════════
//  PIPELINE
// ═══════════════════════════════════════════════
function renderPipeline() {
  const leads   = S.entities.filter(r => r['Тип']==='Лид');
  const projs   = S.entities.filter(r => r['Тип']==='Проект');
  const active  = leads.filter(r => !CLOSED_LEAD.includes(r['Статус']));
  const filtered = S.funnelFilter ? active.filter(r => r['Статус']===S.funnelFilter) : active;

  const funnelHTML = LEAD_STAGES.map(st => {
    const cnt  = active.filter(r => r['Статус']===st.key).length;
    const sum  = active.filter(r => r['Статус']===st.key).reduce((s,r)=>s+(parseFloat(r['Сумма'])||0),0);
    const isFil = S.funnelFilter===st.key;
    return `<div class="funnel-stage ${isFil?'active-filter':''}" onclick="setFunnelFilter('${st.key}')">
      <div class="f-num">${st.num}</div>
      <div class="f-count">${cnt}</div>
      <div class="f-label">${st.key.replace(/^\d+ /,'')}</div>
      ${sum?`<div class="f-sum">${fmtRub(sum)}</div>`:''}
    </div>`;
  }).join('');

  const leadsRows = (S.funnelFilter ? filtered : active).map(r => {
    const diff = daysDiff(r['Дата следующего шага']);
    const dateColor = diff!==null && diff<0 ? 'style="color:var(--accent2)"' : '';
    return `<tr onclick='openEntityModal(${JSON.stringify(r)})'>
      <td><div class="td-name">${r['Название']||'—'}</div><div class="td-sub">${r['Клиент']||''}</div></td>
      <td><span class="s-badge ${stageClass(r['Статус'])}">${r['Статус']||'—'}</span></td>
      <td class="td-sum">${r['Сумма']?fmtRub(r['Сумма']):'—'}</td>
      <td class="td-mono" ${dateColor}>${fmtDate(r['Дата следующего шага'])}</td>
      <td class="td-focus">${r['Следующий шаг']||'—'}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="5"><div class="empty"><div class="empty-icon">🔍</div><p>Нет лидов</p></div></td></tr>`;

  const projRows = projs.filter(r => !CLOSED_PROJ.includes(r['Статус'])).map(r => {
    const diff = daysDiff(r['Дата следующего шага']);
    const dateColor = diff!==null && diff<0 ? 'style="color:var(--accent2)"' : '';
    return `<tr onclick='openEntityModal(${JSON.stringify(r)})'>
      <td><div class="td-name">${r['Название']||'—'}</div><div class="td-sub">${r['Клиент']||''}</div></td>
      <td><span class="s-badge ${stageClass(r['Статус'])}">${r['Статус']||'—'}</span></td>
      <td class="td-focus">${r['Текущий фокус']||'—'}</td>
      <td class="td-focus">${r['Следующий шаг']||'—'}</td>
      <td class="td-mono" ${dateColor}>${fmtDate(r['Дата следующего шага'])}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="5"><div class="empty"><div class="empty-icon">📭</div><p>Нет проектов</p></div></td></tr>`;

  const filterLabel = S.funnelFilter ? ` — <span style="color:var(--accent)">${S.funnelFilter}</span>` : '';

  document.getElementById('pipeline-content').innerHTML = `
    <p class="sec mt0">Воронка лидов</p>
    <div class="funnel-scroll"><div class="funnel" id="pip-funnel">${funnelHTML}</div></div>

    <div style="display:flex; align-items:center; justify-content:space-between; margin-top:20px; margin-bottom:10px; flex-wrap:wrap; gap:8px;">
      <p class="sec" style="margin:0">Лиды${filterLabel}</p>
      ${S.funnelFilter ? `<button class="btn-sm" onclick="clearFunnelFilter()">✕ Сбросить фильтр</button>` : ''}
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Название / клиент</th><th>Статус</th><th>Сумма</th><th>След. шаг</th><th>Действие</th></tr></thead>
          <tbody>${leadsRows}</tbody>
        </table>
      </div>
    </div>

    <p class="sec">Проекты</p>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Название / клиент</th><th>Статус</th><th>Фокус</th><th>Следующий шаг</th><th>Дата</th></tr></thead>
          <tbody>${projRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function setFunnelFilter(key) {
  S.funnelFilter = S.funnelFilter===key ? null : key;
  renderPipeline();
}
function clearFunnelFilter() { S.funnelFilter=null; renderPipeline(); }

// ═══════════════════════════════════════════════
//  MONEY
// ═══════════════════════════════════════════════
function renderMoney() {
  document.getElementById('money-content').innerHTML = `
    <p class="sec mt0">Динамика</p>
    <div class="chart-panel">
      <div class="chart-header">
        <span class="chart-title">Доходы и расходы</span>
        <div class="period-btns">
          <button class="period-btn ${S.moneyPeriod==='7d'   ?'active':''}" onclick="setPeriod('7d')">7д</button>
          <button class="period-btn ${S.moneyPeriod==='14d'  ?'active':''}" onclick="setPeriod('14d')">14д</button>
          <button class="period-btn ${S.moneyPeriod==='30d'  ?'active':''}" onclick="setPeriod('30d')">30д</button>
          <button class="period-btn ${S.moneyPeriod==='6m'   ?'active':''}" onclick="setPeriod('6m')">6м</button>
          <button class="period-btn ${S.moneyPeriod==='year' ?'active':''}" onclick="setPeriod('год')">Год</button>
        </div>
      </div>
      <canvas id="money-chart" style="max-height:220px"></canvas>
      <div class="chart-legend mt8">
        <span><span class="ldot" style="background:var(--accent)"></span>Доходы</span>
        <span><span class="ldot" style="background:var(--accent2)"></span>Расходы</span>
      </div>
    </div>

    <p class="sec">Транзакции</p>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Дата</th><th>Тип</th><th>Сумма</th><th>Клиент</th><th>Комментарий</th></tr></thead>
          <tbody>${buildMoneyRows()}</tbody>
        </table>
      </div>
    </div>
  `;
  buildMoneyChart();
}

function buildMoneyRows() {
  const rows = [...S.money].reverse();
  if (!rows.length) return `<tr><td colspan="5"><div class="empty"><div class="empty-icon">💸</div><p>Нет транзакций</p></div></td></tr>`;
  return rows.map(r => {
    const isInc = r['Тип']==='Доход';
    return `<tr>
      <td class="td-mono">${fmtDate(r['Дата'])}</td>
      <td><span class="s-badge ${isInc?'sf-work':'sf-pause'}">${r['Тип']||'—'}</span></td>
      <td class="td-sum" style="color:${isInc?'var(--accent3)':'var(--accent2)'}">${fmtRubFull(r['Сумма'])}</td>
      <td style="font-size:12px">${r['Клиент']||'—'}</td>
      <td class="td-focus">${r['Комментарий']||'—'}</td>
    </tr>`;
  }).join('');
}

function setPeriod(p) {
  // normalize
  const map = {'7d':'7d','14d':'14d','30d':'30d','6m':'6m','год':'year','year':'year'};
  S.moneyPeriod = map[p] || '30d';
  renderMoney();
}

function buildMoneyChart() {
  const tod = today0();
  let days = [];

  if (S.moneyPeriod === '7d')   { for(let i=6;i>=0;i--){ const d=new Date(tod);d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10)); } }
  if (S.moneyPeriod === '14d')  { for(let i=13;i>=0;i--){ const d=new Date(tod);d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10)); } }
  if (S.moneyPeriod === '30d')  { for(let i=29;i>=0;i--){ const d=new Date(tod);d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10)); } }
  if (S.moneyPeriod === '6m')   {
    for(let i=5;i>=0;i--){ const d=new Date(tod);d.setMonth(d.getMonth()-i);days.push(d.toISOString().slice(0,7)); }
  }
  if (S.moneyPeriod === 'year') {
    for(let i=11;i>=0;i--){ const d=new Date(tod);d.setMonth(d.getMonth()-i);days.push(d.toISOString().slice(0,7)); }
  }

  const isMonthly = S.moneyPeriod==='6m' || S.moneyPeriod==='year';
  const incMap={}, expMap={};
  days.forEach(d => { incMap[d]=0; expMap[d]=0; });

  S.money.forEach(r => {
    const rawD = r['Дата']||'';
    const key  = isMonthly ? rawD.slice(0,7) : rawD.slice(0,10);
    const amt  = parseFloat(r['Сумма'])||0;
    if (incMap[key]!==undefined) {
      if (r['Тип']==='Доход')  incMap[key]+=amt;
      else                      expMap[key]+=amt;
    }
  });

  const labels = days.map(d => isMonthly
    ? new Date(d+'-01').toLocaleDateString('ru',{month:'short',year:'2-digit'})
    : d.slice(5).replace('-','.'));

  if (moneyChart) { moneyChart.destroy(); moneyChart=null; }
  const ctx = document.getElementById('money-chart');
  if (!ctx) return;

  moneyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Доход',  data: days.map(d=>incMap[d]), backgroundColor:'rgba(0,168,184,.55)', borderColor:'rgba(0,168,184,.9)', borderWidth:1, borderRadius:3 },
        { label:'Расход', data: days.map(d=>expMap[d]), backgroundColor:'rgba(217,79,79,.4)',  borderColor:'rgba(217,79,79,.75)', borderWidth:1, borderRadius:3 }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:true,
      plugins: {
        legend: { display:false },
        tooltip: {
          backgroundColor:'#fff', borderColor:'var(--border)', borderWidth:1,
          titleColor:'#1A1A24', bodyColor:'#555',
          callbacks: { label: c => ` ${c.dataset.label}: ${c.raw.toLocaleString('ru')} ₽` }
        }
      },
      scales: {
        x: { grid:{color:'rgba(0,0,0,.05)'}, ticks:{color:'#8A8A9A', font:{family:'JetBrains Mono', size:9}, maxTicksLimit:12} },
        y: { grid:{color:'rgba(0,0,0,.05)'}, ticks:{color:'#8A8A9A', font:{family:'JetBrains Mono', size:10}, callback:v=>v>=1000?(v/1000)+'к':v} }
      }
    }
  });
}

// ═══════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════
function openEntityModal(r) {
  const isLead = r['Тип']==='Лид';
  const diff   = daysDiff(r['Дата следующего шага']);
  let urgencyHTML = '';
  if (diff !== null) {
    if (diff < 0)      urgencyHTML = `<span class="badge-time overdue" style="display:inline-flex">просрочено ${Math.abs(diff)}д</span>`;
    else if (diff===0) urgencyHTML = `<span class="badge-time today"   style="display:inline-flex">сегодня</span>`;
    else if (diff<=3)  urgencyHTML = `<span class="badge-time soon"    style="display:inline-flex">через ${diff}д</span>`;
  }

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-header">
      <div class="modal-title">${r['Название']||'—'}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      <span class="s-badge ${isLead?'badge-lead':'badge-proj'}" style="background:${isLead?'var(--accent-bg)':'var(--accent3-bg)'};color:${isLead?'var(--accent)':'var(--accent3)'}">
        ${r['Тип']}
      </span>
      <span class="s-badge ${stageClass(r['Статус'])}">${r['Статус']||'—'}</span>
      ${urgencyHTML}
    </div>
    <hr class="modal-sep" style="margin-top:0">
    <div class="modal-grid">
      <div class="modal-field"><div class="modal-field-label">Клиент</div><div class="modal-field-value">${r['Клиент']||'—'}</div></div>
      ${isLead && r['Сумма'] ? `<div class="modal-field"><div class="modal-field-label">Потенциал</div><div class="modal-field-value big">${fmtRubFull(r['Сумма'])}</div></div>` : '<div></div>'}
    </div>
    ${r['Текущий фокус'] ? `<div class="modal-field"><div class="modal-field-label">Текущий фокус</div><div class="modal-field-value">${r['Текущий фокус']}</div></div>` : ''}
    <div class="modal-field"><div class="modal-field-label">Следующий шаг</div><div class="modal-field-value" style="color:var(--accent);font-weight:700">→ ${r['Следующий шаг']||'не задан'}</div></div>
    <div class="modal-field"><div class="modal-field-label">Дата следующего шага</div><div class="modal-field-value mono">${fmtDate(r['Дата следующего шага'])}</div></div>
    ${r['Заметки'] ? `<hr class="modal-sep"><div class="modal-field"><div class="modal-field-label">Заметки</div><div class="modal-field-value" style="color:var(--muted);font-size:13px;line-height:1.5">${r['Заметки']}</div></div>` : ''}
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
loadAll();
</script>
</body>
</html>
